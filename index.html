<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚡ BLACKOUT · Webquest de Electricidad · 3º ESO</title>
<style>
  /* ====== Webquest estrella — Electricidad 3º ESO ======
     100% autónoma: sin React, sin CDN, sin cuenta. Funciona offline.
     Principios encarnados: gancho narrativo (P2), andamiaje con retirada
     progresiva (P3), transposición del saber técnico (P4), entrega
     progresiva / carga cognitiva (P5), interactividad + feedback + recuperación
     (P6), DUA y accesibilidad (P7), reto + tarea auténtica (P1). */

  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#050510; --bg2:#0c0c18; --ink:#d8d8e2; --ink-soft:#adadc4;
    --amber:#ffd60a; --cyan:#22b8d8; --red:#ff5d5d; --green:#2ee08a; --violet:#9d7bff;
    --line:rgba(255,255,255,.08);
    --mono:ui-monospace,'Cascadia Code','JetBrains Mono','Source Code Pro',Menlo,Consolas,monospace;
    --body:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  }
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.65;
    background-image:radial-gradient(circle at 50% -10%,rgba(255,214,10,.06),transparent 55%);
    min-height:100vh;font-size:17px}
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 90px}

  /* Header */
  header{text-align:center;padding:14px 0 26px}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-soft)}
  h1{font-family:var(--mono);font-weight:700;font-size:clamp(30px,7vw,46px);letter-spacing:1px;margin:6px 0 4px;color:#fff;
     text-shadow:0 0 18px rgba(255,214,10,.35);animation:flicker 6s infinite}
  h1 .bolt{color:var(--amber)}
  .sub{color:var(--ink-soft);font-size:14px}
  @keyframes flicker{0%,100%{opacity:1}3%{opacity:.6}5%{opacity:.9}7%{opacity:.5}9%{opacity:1}70%{opacity:.85}72%{opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* Progress */
  .progress{display:flex;gap:7px;margin:0 0 14px;flex-wrap:wrap}
  .progress .seg{flex:0 0 auto;width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--ink-soft);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .3s;padding:0;display:flex;align-items:center;justify-content:center}
  .progress .seg:hover:not(:disabled){border-color:var(--amber);color:#fff}
  .progress .seg:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .progress .seg:disabled{opacity:.35;cursor:default}
  .progress .seg.done{background:rgba(255,214,10,.15);border-color:var(--amber);color:var(--amber)}
  .progress .seg.cur{background:var(--amber);border-color:var(--amber);color:#101418;font-weight:bold;box-shadow:0 0 12px rgba(255,214,10,.35)}
  .q.reveal{animation:fadeUp .4s ease}
  .qcount{float:right;font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:1px;margin-left:10px}
  .stepmeta{font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase}

  /* Flujo animado de corriente / agua (refuerzo visual, P7) */
  .flow{fill:none;stroke:#ffd60a;stroke-width:2;stroke-linecap:round;stroke-dasharray:3 11;animation:flowmove 1.1s linear infinite;opacity:.9}
  .flow.water{stroke:#5fd6ef}
  @keyframes flowmove{to{stroke-dashoffset:-14}}
  .gap-pulse{animation:pulsegap 1.4s ease-in-out infinite}
  @keyframes pulsegap{0%,100%{opacity:.15}50%{opacity:.9}}
  @media (prefers-reduced-motion: reduce){.flow,.gap-pulse{animation:none;opacity:.5}}

  /* Tarjetas de equivalencia agua <-> electricidad */
  .ana-hint{font-size:13px;color:var(--ink-soft);margin:14px 0 8px}
  .ana-cards{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 6px}
  .ana-card{flex:1 1 150px;min-height:54px;border:1px solid var(--line);border-radius:12px;background:rgba(95,214,239,.06);color:#dfe6ee;font:inherit;font-size:14px;cursor:pointer;padding:10px 12px;text-align:center;transition:all .25s}
  .ana-card:hover{border-color:rgba(95,214,239,.5)}
  .ana-card:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .ana-card .back{display:none}
  .ana-card.rev{background:rgba(255,214,10,.08);border-color:rgba(255,214,10,.5)}
  .ana-card.rev .front{display:none}
  .ana-card.rev .back{display:inline}
  .ana-card small{color:var(--ink-soft);font-size:12px}
  .ana-card.rev small{color:#cfc18a}
  header{position:relative}
  .a11y{display:flex;justify-content:center;gap:6px;margin-top:12px}
  .a11y button{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink-soft);border-radius:8px;padding:5px 10px;font-family:var(--mono);font-size:12px;cursor:pointer}
  .a11y button:hover{color:var(--ink)}
  body.light{--bg:#eef0f6;--bg2:#ffffff;--ink:#20203a;--ink-soft:#565676;--line:rgba(25,25,60,.18);--amber:#8a6d00;--cyan:#0e7f99;--violet:#6a3fd6;--green:#128a52;--red:#c93a3a}
  body.light .progress .seg.cur{background:#ffd60a;border-color:#e6c200;color:#1a1a1a}
  body.light svg{background:#0c0c18}
  body.light .a11y button{background:rgba(25,25,60,.06)}
  body.light textarea{background:rgba(25,25,60,.04)}
  body.light button.opt{background:rgba(25,25,60,.04)}
  body.light .chip{background:rgba(25,25,60,.05)}
  body.light h1{color:#1c1c34;text-shadow:none}
  body.light .phase h2,body.light .phase p.lead,body.light strong,body.light .q .qtext,
  body.light .fb b,body.light label.rq,body.light .entrega .lbl{color:#15152c}
  body.light .opt.correct,body.light .opt.wrong,body.light .chip.sel,body.light .chip.ok,body.light .chip.bad{color:#15152c}
  body.light .progress .seg:hover:not(:disabled),body.light .retry:hover,body.light .btn.ghost:hover{color:#15152c}
  body.light .ana-card.rev small{color:#7a6a14}
  .hypbox{border:1px dashed rgba(255,214,10,.45);border-radius:10px;background:rgba(255,214,10,.05);padding:12px 14px;margin:14px 0 10px}
  .hyphead{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .hypq{color:var(--ink);font-style:italic}
  .hypfoot{color:var(--ink-soft);font-size:13px;margin-top:6px}

  /* Phase card */
  .phase{animation:fadeUp .4s ease}
  .phase h2{font-family:var(--mono);font-size:23px;color:#fff;margin:2px 0 4px;letter-spacing:.5px}
  .phase .tag{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;
    padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--ink-soft);margin-bottom:14px}
  .phase p{margin:0 0 14px;color:var(--ink)}
  .phase p.lead{color:#fff;font-size:18px}
  .muted{color:var(--ink-soft)}
  strong{color:#fff}

  /* Narrative / story box */
  .story{background:linear-gradient(180deg,rgba(255,93,93,.07),rgba(255,93,93,.02));
    border:1px solid rgba(255,93,93,.22);border-left:3px solid var(--red);border-radius:12px;padding:18px 20px;margin:0 0 20px}
  .story .time{font-family:var(--mono);color:var(--red);font-size:13px;letter-spacing:2px}

  /* Scaffold box (the "support" that fades) */
  .scaffold{background:rgba(34,184,216,.06);border:1px solid rgba(34,184,216,.22);border-radius:12px;padding:16px 20px;margin:0 0 18px}
  .scaffold .head{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .analogy{background:rgba(157,123,255,.06);border:1px solid rgba(157,123,255,.22);border-radius:12px;padding:14px 18px;margin:0 0 18px}
  .analogy .head{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--violet);margin-bottom:6px}

  /* SVG diagram caption */
  figure{margin:8px 0 20px;text-align:center}
  figure svg{max-width:100%;height:auto;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:12px;padding:10px}
  figcaption{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-top:8px}

  /* Quiz */
  .quiz{margin:6px 0 8px}
  .q{margin:0 0 22px}
  .q .qtext{color:#fff;font-size:17px;font-weight:500;margin:0 0 10px}
  .opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:13px 16px;margin-bottom:8px;
    border:1px solid var(--line);background:rgba(255,255,255,.015);color:var(--ink);border-radius:10px;
    font-size:16px;font-family:var(--body);cursor:pointer;transition:all .18s;line-height:1.45}
  .opt:hover:not(:disabled){border-color:rgba(255,214,10,.4);background:rgba(255,214,10,.04)}
  .opt:disabled{cursor:default}
  .opt .key{font-family:var(--mono);color:var(--ink-soft);font-size:14px;flex:none}
  .opt.correct{border-color:var(--green);background:rgba(46,224,138,.08);color:#fff}
  .opt.wrong{border-color:var(--red);background:rgba(255,93,93,.08);color:#fff}
  .opt.dim{opacity:.35}
  .opt .mark{margin-left:auto;font-family:var(--mono);font-weight:700}
  .opt.correct .mark{color:var(--green)}
  .opt.wrong .mark{color:var(--red)}
  .cloud-q{margin:18px 0 4px;padding:16px 18px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.015)}
  .cloud{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0}
  .chip{padding:10px 18px;border:1px solid var(--line);background:rgba(255,255,255,.02);color:var(--ink);
    border-radius:999px;font-size:15px;font-family:var(--body);cursor:pointer;transition:all .15s}
  .chip:hover{border-color:rgba(255,214,10,.4)}
  .chip.sel{border-color:var(--accent,#22b8d8);background:rgba(34,184,216,.14);color:#fff}
  .chip.ok{border-color:var(--green);background:rgba(46,224,138,.14);color:#fff}
  .chip.bad{border-color:var(--red);background:rgba(255,93,93,.14);color:#fff}
  .fb{margin:6px 0 0;padding:12px 16px;border-radius:10px;font-size:15px;animation:fadeUp .3s}
  .fb.ok{background:rgba(46,224,138,.06);border:1px solid rgba(46,224,138,.2);color:var(--ink)}
  .fb.no{background:rgba(255,93,93,.06);border:1px solid rgba(255,93,93,.2);color:var(--ink)}
  .fb b{color:#fff}
  .retry{margin-top:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:transparent;
    color:var(--ink-soft);font-family:var(--mono);font-size:13px;cursor:pointer}
  .retry:hover{color:#fff;border-color:var(--ink-soft)}

  /* Expandable ampliación (DUA: reto adicional para quien va rápido) */
  details.amp{border:1px dashed rgba(255,214,10,.3);border-radius:10px;padding:0 16px;margin:4px 0 20px;background:rgba(255,214,10,.02)}
  details.amp summary{cursor:pointer;font-family:var(--mono);font-size:13px;letter-spacing:1px;color:var(--amber);padding:13px 0;list-style:none}
  details.amp summary::-webkit-details-marker{display:none}
  details.amp summary::before{content:"▸ ";color:var(--amber)}
  details.amp[open] summary::before{content:"▾ "}
  details.amp .body{padding:0 0 14px;color:var(--ink-soft);font-size:15px}

  /* Reto experto (DUA: techo / altas capacidades) — opcional, no bloquea el avance */
  details.expert{border:1px solid rgba(157,123,255,.35);border-radius:10px;padding:0 16px;margin:4px 0 20px;background:rgba(157,123,255,.04)}
  .expert-box{border:2px solid rgba(157,123,255,.5);border-radius:12px;padding:16px 20px;margin:18px 0 4px;background:rgba(157,123,255,.09)}
  .expert-box .head{color:var(--violet);font-weight:700;margin-bottom:8px}
  details.expert summary{cursor:pointer;font-family:var(--mono);font-size:13px;letter-spacing:1px;color:var(--violet);padding:13px 0;list-style:none}
  details.expert summary::-webkit-details-marker{display:none}
  details.expert summary::before{content:"★ ";color:var(--violet)}
  details.expert summary::after{content:" · toca para desplegar el reto";color:var(--ink-soft);font-size:11px;letter-spacing:0}
  details.expert[open] summary::after{content:""}
  details.expert .body{padding:0 0 14px;color:var(--ink);font-size:15px}
  details.expert .body p{margin:0 0 10px}
  .badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;background:rgba(157,123,255,.18);color:var(--violet);padding:2px 8px;border-radius:999px;margin-left:8px}
  details.sol{border-left:2px solid rgba(46,224,138,.4);padding:2px 0 2px 12px;margin:6px 0 0}
  details.sol summary{cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--green);list-style:none}
  details.sol summary::-webkit-details-marker{display:none}
  details.sol summary::before{content:"✓ ";}
  details.sol .body{color:var(--ink-soft);font-size:14px;padding-top:6px}
  details.sol.pista{border-left-color:rgba(255,220,0,.5)}
  details.sol.pista summary{color:var(--amber)}
  details.sol.pista summary::before{content:"";}
  .formula{font-family:var(--mono);color:var(--amber);background:rgba(255,214,10,.08);padding:1px 7px;border-radius:5px;white-space:nowrap}

  /* Final task */
  .task label{display:block;font-family:var(--mono);font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);margin:18px 0 6px}
  label.rq{display:block;font-family:var(--body);font-size:17px;text-transform:none;letter-spacing:0;color:#fff;font-weight:500;margin:18px 0 8px;line-height:1.4}
  textarea{display:block;width:100%;box-sizing:border-box;min-height:96px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);padding:12px 14px;font-family:var(--body);font-size:16px;line-height:1.6;resize:vertical}
  textarea:focus{outline:none;border-color:rgba(255,214,10,.45)}
  .hint{font-size:14px;color:var(--ink-soft);margin:-4px 0 0}

  /* Buttons / nav */
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px}
  .btn{padding:13px 26px;border-radius:10px;border:1.5px solid var(--amber);background:rgba(255,214,10,.12);
    color:var(--amber);font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s}
  .btn:hover:not(:disabled){background:rgba(255,214,10,.22)}
  .btn:disabled{opacity:.3;cursor:not-allowed;border-color:var(--line);color:var(--ink-soft);background:transparent}
  .btn.ghost{border-color:var(--line);background:transparent;color:var(--ink-soft)}
  .btn.ghost:hover{color:#fff;border-color:var(--ink-soft)}
  .locked-note{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}

  /* Closing */
  .done-screen{text-align:center;padding:20px 0}
  .done-screen .big{font-family:var(--mono);font-size:30px;color:var(--green);margin:8px 0}
  footer{margin-top:40px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:1px}

  /* Caja de entrega (lo que el alumno ha escrito) — se imprime en el PDF */
  .entrega{text-align:left;margin:18px 0;border:1px solid var(--line);border-radius:12px;padding:18px 20px;background:rgba(255,255,255,.02)}
  .entrega-h{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
  .entrega .lbl{margin:0 0 4px;color:#fff}
  .entrega .ans{white-space:pre-wrap;color:var(--ink-soft);margin:0 0 14px}

  /* PDF limpio al imprimir/guardar */
  @media print{
    body{background:#fff !important;color:#111 !important;background-image:none !important}
    .progress,.stepmeta,.nav,footer,.kicker,.sub,#printBtn{display:none !important}
    h1{color:#111 !important;text-shadow:none !important;animation:none !important}
    .done-screen .big{color:#111 !important}
    .done-screen .lead,.done-screen .muted,.entrega .ans,.entrega .lbl{color:#222 !important}
    .entrega{background:#fff !important;border-color:#bbb !important}
    .entrega-h{color:#111 !important}
    strong{color:#000 !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Expediente eléctrico · 3º ESO</div>
    <h1><span class="bolt">⚡</span> BLACKOUT</h1>
    <div class="sub">Diagnostica el apagón. Descifra los circuitos de tu casa.</div>
    <div class="a11y" role="group" aria-label="Ajustes de visualización">
      <button type="button" id="fsMinus" aria-label="Reducir el tamaño de la letra">A−</button>
      <button type="button" id="fsPlus" aria-label="Aumentar el tamaño de la letra">A+</button>
      <button type="button" id="themeBtn" aria-pressed="false" aria-label="Cambiar entre tema oscuro y claro">☀ tema</button>
    </div>
  </header>

  <nav class="progress" id="progress" aria-label="Mapa de fases: pulsa un número para volver a una fase ya desbloqueada"></nav>
  <div class="stepmeta" id="stepmeta"></div>

  <main id="stage" aria-live="polite"></main>

  <div class="nav">
    <button class="btn ghost" id="prevBtn">‹ Atrás</button>
    <button class="btn ghost" id="draftBtn" title="Descarga un archivo .txt con tus respuestas para no perderlas">💾 Borrador</button>
    <span class="locked-note" id="lockNote"></span>
    <button class="btn" id="nextBtn">Siguiente ›</button>
  </div>

  <footer>Webquest narrativa · prueba de concepto del modelo · funciona sin conexión y sin cuenta</footer>
</div>

<script>
/* ============================================================
   MOTOR DE FASES (vanilla JS) — entrega progresiva (P5)
   Cada fase puede tener un "quiz" que hay que superar para
   desbloquear la siguiente: el andamiaje se retira por fases (P3).
   ============================================================ */

// --- Diagramas SVG (DUA: representación visual además de texto, P7) ---
const svgSerie = `
<svg viewBox="0 0 420 150" role="img" aria-label="Circuito en serie: una pila y tres bombillas en un único camino">
  <g fill="none" stroke="#22b8d8" stroke-width="3">
    <rect x="20" y="30" width="380" height="90" rx="6"/>
  </g>
  <!-- pila -->
  <g stroke="#ffd60a" stroke-width="3"><line x1="20" y1="60" x2="20" y2="90"/></g>
  <line x1="14" y1="66" x2="26" y2="66" stroke="#ffd60a" stroke-width="3"/>
  <line x1="17" y1="84" x2="23" y2="84" stroke="#ffd60a" stroke-width="5"/>
  <text x="6" y="112" fill="#9a9ab0" font-size="11" font-family="monospace">pila</text>
  <!-- bombillas en el camino superior -->
  ${[120,210,300].map((x,i)=>`<circle cx="${x}" cy="30" r="13" fill="rgba(255,214,10,.15)" stroke="#ffd60a" stroke-width="2.5"/><text x="${x}" y="34" fill="#ffd60a" font-size="13" text-anchor="middle" font-family="monospace">${i+1}</text>`).join('')}
  <path class="flow" d="M20 60 L20 30 L400 30 L400 120 L20 120 L20 90"/>
  <text x="200" y="142" fill="#9a9ab0" font-size="11" text-anchor="middle" font-family="monospace">un solo camino — si se corta, se apaga TODO</text>
</svg>`;

const svgParalelo = `
<svg viewBox="0 0 420 170" role="img" aria-label="Circuito en paralelo: una pila y tres bombillas, cada una en su propia rama">
  <g fill="none" stroke="#22b8d8" stroke-width="3">
    <line x1="60" y1="40" x2="330" y2="40"/>
    <line x1="60" y1="130" x2="330" y2="130"/>
  </g>
  <!-- pila a la izquierda -->
  <g stroke="#ffd60a" stroke-width="3"><line x1="60" y1="40" x2="60" y2="130"/></g>
  <line x1="54" y1="78" x2="66" y2="78" stroke="#ffd60a" stroke-width="3"/>
  <line x1="57" y1="92" x2="63" y2="92" stroke="#ffd60a" stroke-width="5"/>
  <text x="40" y="158" fill="#9a9ab0" font-size="11" font-family="monospace">pila</text>
  <!-- tres ramas verticales con bombilla -->
  ${[140,230,320].map((x,i)=>`
    <line x1="${x}" y1="40" x2="${x}" y2="70" stroke="#22b8d8" stroke-width="3"/>
    <line x1="${x}" y1="100" x2="${x}" y2="130" stroke="#22b8d8" stroke-width="3"/>
    <circle cx="${x}" cy="85" r="13" fill="rgba(255,214,10,.15)" stroke="#ffd60a" stroke-width="2.5"/>
    <text x="${x}" y="89" fill="#ffd60a" font-size="13" text-anchor="middle" font-family="monospace">${i+1}</text>`).join('')}
  <path class="flow" d="M60 78 L60 40 L320 40"/>
  <path class="flow" d="M320 130 L60 130 L60 92"/>
  ${[140,230,320].map(x=>`<path class="flow" d="M${x} 40 L${x} 70"/><path class="flow" d="M${x} 100 L${x} 130"/>`).join('')}

function maxUnlocked(){
  let m=0;
  for(let i=0;i<PHASES.length;i++){ m=i; if(!passed[i]) break; }

function buildProgress(){
  prog.innerHTML = '';
  const limit=maxUnlocked();
  PHASES.forEach((p,i)=>{
    const s=document.createElement('button');
    s.type='button';
    s.className='seg'+(passed[i]?' done':'')+(i===current?' cur':'');
    s.title=p.label;
    s.setAttribute('aria-label', p.label + (passed[i] ? ' (completada)' : i>limit ? ' (bloqueada)' : ''));
    if(i===current) s.setAttribute('aria-current','step');
    s.disabled = i>limit;
    s.textContent = (passed[i] && i!==current) ? '✓' : String(i);
    if(i<=limit) s.addEventListener('click',()=>{ if(i!==current){ current=i; render(); } });
    prog.appendChild(s);
  });
}

function renderQuiz(phase, container){
  // si la fase no tiene preguntas cerradas, se puede avanzar libremente
  if(!phase.quiz || phase.quiz.length===0){ passed[current]=true; updateNav(); buildProgress(); return; }
  // estado local del quiz de esta fase
  const state = phase.quiz.map(()=>({answered:false,ok:false}));
  // entrega progresiva también dentro de la fase: las preguntas aparecen
  // de una en una; al revisitar una fase ya superada se muestran todas
  const stepwise = !passed[current];
  const qEls = [];
  function revealNext(qi){
    const nxt=qEls[qi+1];
    if(stepwise && nxt && !nxt.isConnected){
      nxt.classList.add('reveal');
      container.appendChild(nxt);
      try{ nxt.scrollIntoView({behavior:'smooth',block:'center'}); }catch(e){}
    }
  }
  function checkComplete(){
    const allOk = phase.quiz.length>0 && state.every(s=>s.ok);
    if(allOk){ passed[current]=true; updateNav(); buildProgress(); }
  }
  phase.quiz.forEach((q,qi)=>{
    const qd=document.createElement('div'); qd.className='q';
    const qt=document.createElement('p'); qt.className='qtext'; qt.textContent=(qi+1)+'. '+q.q;
    const qc=document.createElement('span'); qc.className='qcount'; qc.textContent=(qi+1)+' / '+phase.quiz.length; qt.appendChild(qc);
    qd.appendChild(qt);
    const optWrap=document.createElement('div');
    // barajar las opciones para que la correcta no ocupe siempre la misma posición
    const opts=q.opts.slice();
    for(let k=opts.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));const tmp=opts[k];opts[k]=opts[j];opts[j]=tmp;}
    opts.forEach((opt,oi)=>{
      const b=document.createElement('button');
      b.className='opt'; b.type='button';
      b.innerHTML='<span class="key">'+String.fromCharCode(65+oi)+'</span><span>'+opt.t+'</span>';
      b.addEventListener('click',()=>{
        if(state[qi].answered && state[qi].ok) return;
        // marcar
        Array.from(optWrap.children).forEach(c=>{c.classList.remove('correct','wrong','dim');c.disabled=false;});
        b.classList.add(opt.correct?'correct':'wrong');
        b.setAttribute('aria-pressed','true');
        const mk=document.createElement('span'); mk.className='mark'; mk.textContent=opt.correct?'✓ correcto':'✗ revisa'; b.appendChild(mk);
        state[qi]={answered:true,ok:opt.correct};
        // feedback
        const old=qd.querySelector('.fb'); if(old) old.remove();
        const fb=document.createElement('div'); fb.className='fb '+(opt.correct?'ok':'no');
        fb.setAttribute('role','status'); fb.setAttribute('aria-live','polite');
        fb.innerHTML='<b>'+(opt.correct?'✓ ':'✗ ')+'</b>'+(opt.correct?q.okFb:q.noFb);
        qd.appendChild(fb);
        if(opt.correct){
          Array.from(optWrap.children).forEach(c=>{c.disabled=true; if(!c.classList.contains('correct'))c.classList.add('dim');});
        } else {
          const r=document.createElement('button'); r.className='retry'; r.type='button'; r.textContent='Reintentar ↺';
          r.addEventListener('click',()=>{
            fb.remove(); r.remove();
            Array.from(optWrap.children).forEach(c=>{c.classList.remove('correct','wrong','dim');c.disabled=false;const m=c.querySelector('.mark');if(m)m.remove();});
            state[qi]={answered:false,ok:false};
          });
          fb.appendChild(document.createElement('br')); fb.appendChild(r);
        }
        checkComplete();
        if(opt.correct) revealNext(qi);
      });
      optWrap.appendChild(b);
    });
    qd.appendChild(optWrap);
    qEls.push(qd);
    if(!stepwise || qi===0) container.appendChild(qd);
  });
}

function renderTask(phase){
  setTimeout(()=>{
    const host=document.getElementById('taskActions');
    if(!host) return;
    const btn=document.createElement('button');
    btn.className='btn'; btn.textContent='Generar mi informe en PDF';
    btn.style.cssText='margin-top:8px';
    const msg=document.createElement('div'); msg.setAttribute('aria-live','polite'); msg.style.cssText='margin-top:8px;font-size:14px';
    const extra=document.createElement('div'); extra.style.cssText='margin-top:12px';
    btn.addEventListener('click',()=>{
      buildReport();          // construye la caja de entrega imprimible
      workSaved=true;         // el trabajo ya está a salvo: no avisar al salir
      window.print();         // abrir diálogo de impresión / guardar PDF
      msg.textContent='Informe generado. Súbelo a Classroom (y, si hiciste el dibujo del reto, adjunta también la foto).';
      msg.style.color='var(--green)';
      passed[current]=true; updateNav(); buildProgress();
      if(!extra.dataset.done){
        const exTxt=document.createElement('p');
        exTxt.style.cssText='margin:14px 0 6px;font-size:14px;color:var(--ink-soft)';
        exTxt.textContent='Ahora te mostramos unas preguntas que podrían caer en el examen. Vuelve a ellas cada cierto tiempo para repasar.';
        const goExam=document.createElement('button');
        goExam.className='btn'; goExam.textContent='Ver las preguntas de examen →';
        goExam.style.cssText='margin-top:2px';
        goExam.addEventListener('click',()=>{ current=PHASES.length-1; render(); });
        extra.appendChild(exTxt); extra.appendChild(goExam); extra.dataset.done='1';
      }
    });
    host.appendChild(btn); host.appendChild(msg); host.appendChild(extra);
  },0);
}

function renderRecall(phase){
  // el repaso se "supera" al pulsar el botón de comprobar (no en vivo)
  setTimeout(()=>{
    const host=document.getElementById('recallActions');
    if(!host) return;
    const btn=document.createElement('button');
    btn.className='btn'; btn.textContent='He respondido, comprobar y continuar';
    btn.style.cssText='margin-top:8px';
    const msg=document.createElement('div'); msg.setAttribute('aria-live','polite'); msg.style.cssText='margin-top:8px;font-size:14px';
    btn.addEventListener('click',()=>{
      const filled=['r1','r2','r3'].some(id=>{const el=document.getElementById(id);return el && el.value.trim().length>3;});
      // revelar las respuestas modelo (siempre)
      document.querySelectorAll('details.sol').forEach(d=>{ if(!d.classList.contains('pista')) d.open=true; });
      msg.textContent = filled
        ? '¡Bien! Abajo tienes las respuestas modelo para comparar. Ya puedes avanzar.'
        : 'Te recomendamos intentarlo primero con tus palabras, pero aquí tienes las respuestas modelo. Puedes avanzar.';
      msg.style.color = filled ? 'var(--green)' : 'var(--amber)';
      passed[current]=true; updateNav(); buildProgress();
    });
    host.appendChild(btn); host.appendChild(msg);
  },0);
}

function render(){
  const phase=PHASES[current];
  buildProgress();
  stepmeta.textContent=phase.label+' \u2014 '+(current+1)+' de '+PHASES.length;
  const card=document.createElement('section'); card.className='phase';
  card.innerHTML='<span class="tag">'+phase.tag+'</span><h2>'+phase.title+'</h2>'+phase.body;
  stage.innerHTML=''; stage.appendChild(card);

  if(phase.isTask){ renderTask(phase); }
  else if(phase.isRecall){ renderRecall(phase); }
  else if(phase.cloud){ renderCloud(phase); }
  else if(phase.quiz && phase.quiz.length){
    const qc=document.createElement('div'); qc.className='quiz'; card.appendChild(qc); renderQuiz(phase,qc);
  } else { passed[current]=true; }

  if(phase.after){ const af=document.createElement('div'); af.innerHTML=phase.after; card.appendChild(af); }

  document.querySelector('.nav').style.display='';
  buildProgress();
  restoreSaved(); injectHyp();
  updateNav();
  try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(e){ window.scrollTo(0,0); }
}

function renderCloud(phase){
  passed[current]=false;
  setTimeout(()=>{
    const cloud=document.getElementById('cloud');
    const host=document.getElementById('cloudActions');
    if(!cloud||!host) return;
    const chips=Array.from(cloud.querySelectorAll('.chip'));
    chips.forEach(c=>c.addEventListener('click',()=>{ if(!c.disabled){ c.classList.toggle('sel'); chips.forEach(x=>x.classList.remove('ok','bad')); msg.textContent=''; } }));
    const btn=document.createElement('button'); btn.className='btn'; btn.textContent='Comprobar'; btn.style.cssText='margin-top:10px';
    const msg=document.createElement('div'); msg.setAttribute('aria-live','polite'); msg.style.cssText='margin-top:8px;font-size:14px';
    let intentos=0;
    btn.addEventListener('click',()=>{
      intentos++;
      let allOk=true, faltan=0;
      chips.forEach(c=>{
        const isR=c.dataset.r==='1', sel=c.classList.contains('sel');
        c.classList.remove('ok','bad');
        if(sel&&isR) c.classList.add('ok');
        else if(sel&&!isR){ c.classList.add('bad'); allOk=false; }
        else if(!sel&&isR){ faltan++; allOk=false; }
      });
      if(allOk){
        msg.textContent='¡Perfecto! Los receptores son la bombilla, el motor y el microondas: los tres usan la electricidad para hacer algo (luz, movimiento, calor). El cable la transporta, la pila la genera y el interruptor abre o cierra el paso.';
        msg.style.color='var(--green)';
        chips.forEach(c=>c.disabled=true); btn.disabled=true;
        passed[current]=true; updateNav(); buildProgress();
      } else if(intentos===1){
        msg.textContent='Casi. En verde tus aciertos y en rojo lo que sobra.'+(faltan?' Además te falta'+(faltan>1?'n':'')+' '+faltan+' por encontrar.':'')+' Pista: un receptor APROVECHA la electricidad para hacer algo (dar luz, girar, calentar). Toca para ajustar tu selección y pulsa «Volver a comprobar».';
        msg.style.color='var(--amber)';
        btn.textContent='Volver a comprobar';
      } else {
        // segundo intento o más: marcamos la solución correcta y dejamos avanzar
        chips.forEach(c=>{ c.classList.remove('ok','bad'); if(c.dataset.r==='1'){c.classList.add('ok');c.classList.add('sel');} else {c.classList.remove('sel');} c.disabled=true; });
        msg.textContent='Te marco la solución: los receptores son la bombilla, el motor y el microondas (usan la electricidad para hacer algo). El cable la transporta, la pila la genera y el interruptor abre o cierra el paso. Ya puedes avanzar.';
        msg.style.color='var(--green)';
        btn.disabled=true;
        passed[current]=true; updateNav(); buildProgress();
      }
    });
    host.appendChild(btn); host.appendChild(msg);
  },0);
}

function updateNav(){
  prevBtn.style.visibility = current===0 ? 'hidden':'visible';
  const last = current===PHASES.length-1;
  nextBtn.textContent = last ? 'Finalizar ✦' : 'Siguiente ›';
  nextBtn.disabled = !passed[current];
  lockNote.textContent = passed[current] ? '' : (PHASES[current].isTask ? 'Genera tu informe en PDF para continuar' : PHASES[current].isRecall ? 'Responde las preguntas (o pulsa el botón para ver las respuestas)' : 'Resuelve la actividad para avanzar');
}

function buildReport(){
  // Construye la caja de entrega imprimible dentro de la fase de tarea (para el PDF)
  const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const val = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
  const a2=val('t2'), a3=val('t3'), a4=val('t4');
  const row=(lbl,txt)=> txt ? '<p class="lbl"><strong>'+lbl+':</strong></p><p class="ans">'+esc(txt)+'</p>' : '';
  let box=document.getElementById('reportBox');
  if(box) box.remove();
  box=document.createElement('div'); box.id='reportBox'; box.className='entrega'; box.style.marginTop='16px';
  box.innerHTML='<div class="entrega-h">Mi informe — Misión: el apagón</div>'+
    row('Circuito en paralelo encontrado',a2)+
    row('Diagnóstico del apagón',a3)+
    (a4?row('Reto de diseño',a4):'')+
    '<p class="muted" style="margin-top:10px">Esencial: un circuito es un <strong>camino cerrado</strong>; en <strong>serie</strong> hay un único camino (un fallo lo apaga todo) y en <strong>paralelo</strong> cada aparato tiene el suyo. Una casa es un <strong>circuito mixto</strong>: los aparatos van en paralelo (el fallo de uno no apaga el resto), pero la entrada general es un tramo en serie con el <strong>magnetotérmico</strong>; si se conectan demasiados aparatos a la vez pasa demasiada corriente —como agua empujando en una tubería estrecha— y el magnetotérmico corta desde la entrada: apagón general.</p><p class="muted" style="margin-top:6px"><strong>Caso cerrado:</strong> tu casa es un circuito mixto hecho para protegerte —el paralelo frente al fallo de un aparato; la entrada en serie con el magnetotérmico frente a la sobrecarga—. El apagón no fue un fallo: <strong>fue el diseño protegiéndote</strong>.</p>';
  const host=document.getElementById('taskActions');
  host.parentNode.insertBefore(box, host);
}

function finish(){
  // La última fase es "preguntas de examen": cierre simple, sin PDF (el PDF ya se generó en la tarea)
  stage.innerHTML='<div class="done-screen phase">'+
    '<div class="big">✦ CASO CERRADO ✦</div>'+
    '<p class="lead">Has completado la misión y ya tienes tus preguntas de examen.</p>'+
    '<p class="muted">Consejo: vuelve a la pantalla de <strong>preguntas de examen</strong> dentro de unos días y otra vez antes del examen. Recuperar de memoria lo que estudiaste es lo que de verdad lo fija. Y no olvides subir tu informe en PDF (y la foto del reto, si lo hiciste) a Classroom.</p>'+
    '<button class="btn" id="backExam" style="margin-top:18px">Volver a las preguntas de examen</button>'+
    '</div>';
  prog.querySelectorAll('.seg').forEach(s=>s.classList.add('done'));
  stepmeta.textContent='Completado';
  document.querySelector('.nav').style.display='none';
  document.getElementById('backExam').addEventListener('click',()=>{ document.querySelector('.nav').style.display=''; current=PHASES.length-1; render(); });
  try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(e){ window.scrollTo(0,0); }
}

nextBtn.addEventListener('click',()=>{
  if(!passed[current]) return;
  if(current===PHASES.length-1){ finish(); return; }
  current++; render();
});
prevBtn.addEventListener('click',()=>{ if(current>0){current--; render();} });

render();
</script>
</body>
</html>
